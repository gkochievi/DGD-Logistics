services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - ./backend:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  # One-shot: copies React build from image into shared volume (volume must not mask /app/build)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-/api}
        REACT_APP_NOTIFICATION_POLL_MS: ${REACT_APP_NOTIFICATION_POLL_MS:-}
    command: sh -c "cp -a /usr/share/nginx/html/. /out/"
    volumes:
      - frontend_build:/out
    env_file:
      - .env
    restart: "no"

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    volumes:
      - frontend_build:/usr/share/nginx/html
      - media_data:/media
      - static_data:/staticfiles
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_completed_successfully

volumes:
  postgres_data:
  media_data:
  static_data:
  frontend_build:
